services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: grid_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./ingestion/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 10
  ingestion:
    build: ./ingestion
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    entrypoint: [ "tail", "-f", "/dev/null" ]
  meters:
    build: ./ingestion
    container_name: grid_meters
    command: python meter_simulator.py
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
  dbt:
    build: ./dbt
    container_name: grid_dbt
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    entrypoint: [ "tail", "-f", "/dev/null" ]
volumes:
  db_data:
