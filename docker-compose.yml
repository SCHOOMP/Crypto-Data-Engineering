# Runs Postgres AND MongoDB inside Docker so I don't have to install them on my Mac.
# Start them with:  docker compose up -d
# Stop them with:   docker compose down      (my data is kept)
# Wipe them with:   docker compose down -v   (deletes the data too)

services:
  postgres:
    image: postgres:16
    container_name: crypto-sql
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: